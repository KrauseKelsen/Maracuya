<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 500 16px Arial, sans-serif; fill: #4b5563; }
      .boxTitle { font: 700 15px Arial, sans-serif; fill: #111827; }
      .boxText { font: 500 13px Arial, sans-serif; fill: #374151; }
      .groupTitle { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .line { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 7 5; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1600" height="980" fill="#f8fafc"/>
  <text x="40" y="48" class="title">DropDownMrcy - Comunicación entre clases</text>
  <text x="40" y="74" class="subtitle">Diagrama de dependencias y flujo de resolución para Input + Tokens + Variantes + Content</text>

  <text x="65" y="130" class="groupTitle">UI compuesta</text>
  <rect x="40" y="150" rx="14" ry="14" width="360" height="120" fill="#e2e8f0" stroke="#94a3b8"/>
  <text x="60" y="180" class="boxTitle">DropDownMrcy</text>
  <text x="60" y="204" class="boxText">- Orquesta Label + Input + Menú + BottomText</text>
  <text x="60" y="224" class="boxText">- Valida variant/content</text>
  <text x="60" y="244" class="boxText">- Emite onSelectionChange(Set&lt;String&gt;)</text>

  <rect x="40" y="320" rx="14" ry="14" width="360" height="120" fill="#e2e8f0" stroke="#94a3b8"/>
  <text x="60" y="350" class="boxTitle">InputDropDownMrcy</text>
  <text x="60" y="374" class="boxText">- Render del input visual</text>
  <text x="60" y="394" class="boxText">- Estados: enabled, readonly, error, expanded</text>
  <text x="60" y="414" class="boxText">- Leading icon opcional + trailing icon</text>

  <rect x="40" y="490" rx="14" ry="14" width="360" height="140" fill="#e2e8f0" stroke="#94a3b8"/>
  <text x="60" y="520" class="boxTitle">DropDownMenuContent (interno)</text>
  <text x="60" y="544" class="boxText">- Renderiza lista custom (no spinner nativo)</text>
  <text x="60" y="564" class="boxText">- Usa SimpleRow / CheckboxRow</text>
  <text x="60" y="584" class="boxText">- Aplica reglas SINGLE/MULTIPLE</text>
  <text x="60" y="604" class="boxText">- Cierra menú según variante</text>

  <text x="505" y="130" class="groupTitle">Modelo de contenido</text>
  <rect x="470" y="150" rx="14" ry="14" width="420" height="120" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="490" y="180" class="boxTitle">DropDownContent (sealed class)</text>
  <text x="490" y="204" class="boxText">- Simple(items: List&lt;DropDownItem&gt;)</text>
  <text x="490" y="224" class="boxText">- Checkbox(items, selectionMode)</text>
  <text x="490" y="244" class="boxText">- Contrato de negocio escalable</text>

  <rect x="470" y="300" rx="14" ry="14" width="200" height="90" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="490" y="332" class="boxTitle">DropDownItem</text>
  <text x="490" y="356" class="boxText">id, label, enabled</text>

  <rect x="690" y="300" rx="14" ry="14" width="200" height="90" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="710" y="332" class="boxTitle">DropDownSelectionMode</text>
  <text x="710" y="356" class="boxText">SINGLE / MULTIPLE</text>

  <rect x="470" y="420" rx="14" ry="14" width="200" height="90" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="490" y="452" class="boxTitle">DropDownVariant</text>
  <text x="490" y="476" class="boxText">SIMPLE / CHECKBOX</text>

  <rect x="690" y="420" rx="14" ry="14" width="200" height="90" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="710" y="452" class="boxTitle">InputDropDownVariant</text>
  <text x="710" y="476" class="boxText">SIMPLE / CHECKBOX</text>

  <text x="965" y="130" class="groupTitle">Capa de tokens</text>
  <rect x="930" y="150" rx="14" ry="14" width="310" height="110" fill="#dcfce7" stroke="#4ade80"/>
  <text x="950" y="180" class="boxTitle">DropDownTokensResolver</text>
  <text x="950" y="204" class="boxText">resuelve DropDownTokens</text>
  <text x="950" y="224" class="boxText">(bottom text + group input)</text>

  <rect x="1270" y="150" rx="14" ry="14" width="290" height="110" fill="#dcfce7" stroke="#4ade80"/>
  <text x="1290" y="180" class="boxTitle">DropDownTokens</text>
  <text x="1290" y="204" class="boxText">- bottomText*</text>
  <text x="1290" y="224" class="boxText">- inputDropDownTokenGroup</text>

  <rect x="930" y="300" rx="14" ry="14" width="310" height="120" fill="#dcfce7" stroke="#4ade80"/>
  <text x="950" y="330" class="boxTitle">InputDropDownTokensResolver</text>
  <text x="950" y="354" class="boxText">resuelve InputDropDownTokens</text>
  <text x="950" y="374" class="boxText">según variant + group + override</text>
  <text x="950" y="394" class="boxText">+ leadingIconOverride</text>

  <rect x="1270" y="300" rx="14" ry="14" width="290" height="170" fill="#dcfce7" stroke="#4ade80"/>
  <text x="1290" y="330" class="boxTitle">InputDropDownTokens</text>
  <text x="1290" y="354" class="boxText">- border* / text* / placeholder*</text>
  <text x="1290" y="374" class="boxText">- menu* / item*</text>
  <text x="1290" y="394" class="boxText">- trailingCollapsed/ExpandedIcon</text>
  <text x="1290" y="414" class="boxText">- leadingIcon (opcional)</text>
  <text x="1290" y="434" class="boxText">- selectedItemLeadingIcon</text>

  <rect x="930" y="500" rx="14" ry="14" width="310" height="90" fill="#dcfce7" stroke="#4ade80"/>
  <text x="950" y="532" class="boxTitle">InputDropDownTokenGroup</text>
  <text x="950" y="556" class="boxText">BASIC</text>

  <text x="65" y="720" class="groupTitle">Flujos clave</text>
  <rect x="40" y="740" rx="14" ry="14" width="1520" height="180" fill="#fff" stroke="#cbd5e1"/>
  <text x="60" y="772" class="boxText">1) DropDownMrcy valida compatibilidad entre DropDownVariant y DropDownContent.</text>
  <text x="60" y="800" class="boxText">2) DropDownMrcy resuelve DropDownTokens (componente compuesto) y usa InputDropDownTokenGroup para el átomo.</text>
  <text x="60" y="828" class="boxText">3) InputDropDownMrcy resuelve InputDropDownTokens y pinta el input (incluye leading icon opcional).</text>
  <text x="60" y="856" class="boxText">4) DropDownMenuContent usa DropDownContent + selectionMode para construir la lista y emitir selección.</text>
  <text x="60" y="884" class="boxText">5) El texto visible del input se deriva de selectedIds + labels de items seleccionados.</text>

  <path class="line" d="M220 270 L220 320"/>
  <path class="line" d="M220 440 L220 490"/>

  <path class="line" d="M400 205 L470 205"/>
  <path class="line" d="M400 370 L930 360"/>
  <path class="line" d="M400 560 L930 360"/>

  <path class="line" d="M680 270 L570 300"/>
  <path class="line" d="M760 270 L790 300"/>
  <path class="line" d="M570 270 L570 420"/>
  <path class="line" d="M790 270 L790 420"/>

  <path class="line" d="M890 205 L930 205"/>
  <path class="line" d="M1240 205 L1270 205"/>
  <path class="line" d="M1240 360 L1270 360"/>
  <path class="line" d="M1085 260 L1085 300"/>
  <path class="line" d="M1085 420 L1085 500"/>

  <path class="line dash" d="M570 510 L930 545"/>
  <path class="line dash" d="M790 510 L930 360"/>
</svg>
